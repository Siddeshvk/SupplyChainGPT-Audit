name: Keep SupplyChainGPT Awake

on:
  schedule:
    - cron: '0 */8 * * *'   # Every 8 hours
  workflow_dispatch:        # Manual test button

jobs:
  wake-app:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Wake up the app
        run: |
          python <<'EOF'
import time
from playwright.sync_api import sync_playwright

with sync_playwright() as p:
    browser = p.chromium.launch(headless=True)
    page = browser.new_page()
    
    print("🌐 Visiting your app...")
    page.goto("https://supplychaingpt.streamlit.app/", timeout=90000)
    time.sleep(10)
    
    content = page.content().lower()
    if any(word in content for word in ["inactive", "sleep", "wake", "open it", "get this app back up"]):
        print("😴 App was sleeping — waking it up")
        # Click the wake button (works with any "Yes / Open / Wake" text)
        page.get_by_text("Yes", exact=False).or_(page.get_by_text("open", exact=False)).or_(page.get_by_role("button")).first.click()
        time.sleep(45)
        print("✅ Wake button clicked!")
    else:
        print("👍 App was already awake")
    
    page.screenshot(path="status.png")
    browser.close()
print("✅ Keep-alive finished successfully")
          EOF
