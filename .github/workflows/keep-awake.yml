name: Keep SupplyChainGPT Awake

on:
  schedule:
    - cron: '0 */8 * * *'   # Runs every 8 hours
  workflow_dispatch:        # Lets you test it manually

jobs:
  wake-app:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Wake up the app
        run: python - <<'EOF'
import time
from playwright.sync_api import sync_playwright

with sync_playwright() as p:
    browser = p.chromium.launch(headless=True)
    page = browser.new_page()
    
    print("🌐 Visiting https://supplychaingpt.streamlit.app/")
    page.goto("https://supplychaingpt.streamlit.app/", timeout=60000)
    time.sleep(8)  # let page load
    
    # Smart button click — catches "Yes, open it", "Wake up", "Yes" etc.
    wake_button = page.locator("button").filter(has_text="open").or_(
                  page.locator("button").filter(has_text="Wake")).or_(
                  page.locator("button").filter(has_text="Yes"))
    
    if wake_button.count() > 0 and wake_button.first.is_visible(timeout=10000):
        wake_button.first.click()
        print("✅ Clicked wake button!")
        time.sleep(40)  # wait for full boot
    
    page.screenshot(path="status.png")
    browser.close()
EOF
