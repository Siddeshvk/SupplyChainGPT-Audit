name: Keep SupplyChainGPT Awake

on:
  schedule:
    - cron: '0 */8 * * *'   # Every 8 hours
  workflow_dispatch:        # Click to test manually

jobs:
  wake-app:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Wake up the app
        run: |
          python <<'EOF'
import time
from playwright.sync_api import sync_playwright

with sync_playwright() as p:
    browser = p.chromium.launch(headless=True)
    page = browser.new_page()
    
    print("🌐 Visiting https://supplychaingpt.streamlit.app/")
    page.goto("https://supplychaingpt.streamlit.app/", timeout=90000)
    time.sleep(10)
    
    # Smart wake button — works even if text changes
    clicked = False
    for keyword in ["Yes", "open it", "Wake", "get this app back up", "inactive"]:
        try:
            btn = page.get_by_text(keyword, exact=False)
            if btn.is_visible(timeout=8000):
                btn.click()
                print(f"✅ Clicked wake button with: {keyword}")
                clicked = True
                time.sleep(45)
                break
        except:
            pass
    
    if not clicked:
        # Fallback: click the big button if present
        try:
            page.locator("button").first.click()
            print("✅ Fallback click successful")
            time.sleep(45)
        except:
            print("App was already awake 👍")
    
    page.screenshot(path="status.png")
    browser.close()
print("✅ Keep-alive workflow finished")
          EOF
